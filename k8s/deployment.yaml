apiVersion: apps/v1
kind: Deployment
metadata:
  name: aircraft-data-api
  labels:
    app: aircraft-data-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aircraft-data-api
  template:
    metadata:
      labels:
        app: aircraft-data-api
    spec:
      containers:
      - name: api
        image: ghcr.io/pclumson/aircraft-data-model:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: aircraft-secrets
              key: database-url
        - name: DEBUG
          value: "false"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aircraft-data-api-service
spec:
  selector:
    app: aircraft-data-api
  ports:
  - port: 80
    targetPort: 8000
  type: LoadBalancer
